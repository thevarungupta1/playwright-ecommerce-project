<!DOCTYPE html>
<html>
<head>
  <title>Products - Mini Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <strong>Mini Shop</strong>
    <a href="cart.html" style="color:white;">Cart</a>
  </div>

  <div class="container">
    <h1>Products</h1>

    <p id="cart-message" class="success"></p>

    <div class="product">
      <h2>Laptop</h2>
      <p>Price: ₹50000</p>
      <button data-testid="add-laptop" onclick="addToCart('Laptop', 50000)">Add Laptop</button>
    </div>

    <div class="product">
      <h2>Mouse</h2>
      <p>Price: ₹1000</p>
      <button data-testid="add-mouse" onclick="addToCart('Mouse', 1000)">Add Mouse</button>
    </div>

    <div class="product">
      <h2>Keyboard</h2>
      <p>Price: ₹2000</p>
      <button data-testid="add-keyboard" onclick="addToCart('Keyboard', 2000)">Add Keyboard</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
